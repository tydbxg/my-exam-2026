spring.application.name=demo

# MySQL 数据源（请按本地环境修改用户名和密码）
spring.datasource.url=jdbc:mysql://localhost:3306/enrollment_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 启动时执行 demo/sql 下的初始化脚本（在 demo 目录运行 mvn spring-boot:run）
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:sql/schema.sql
spring.sql.init.data-locations=file:sql/data.sql
spring.sql.init.encoding=UTF-8

# 连接池
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
