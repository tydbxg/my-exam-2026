# 单元测试使用内存数据库，无需安装 MySQL
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=file:sql/schema.sql
spring.sql.init.data-locations=file:sql/data.sql
spring.sql.init.encoding=UTF-8
